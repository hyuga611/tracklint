<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>お問い合わせ | example.com</title>
  </head>
  <body>
    <!-- 正しい配線: button type=submit + 一意id + data-gtm-event、AJAX成功時に dataLayer.push、
         サンクスは data-thankyou で解決でき noindex 済み。tracklint は 0 件で通す。 -->
    <form id="contact-form" data-thankyou="thanks.html">
      <input type="text" name="name" required />
      <input type="email" name="email" required />
      <button type="submit" id="contact-submit" data-gtm-event="contact_submit">送信する</button>
    </form>

    <script>
      document.getElementById('contact-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        const res = await fetch('/api/contact', { method: 'POST', body: new FormData(e.target) });
        if (res.ok) {
          dataLayer.push({ event: 'contact_submit' });
          location.href = 'thanks.html';
        }
      });
    </script>
  </body>
</html>
