<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8" />
    <title>お問い合わせ | example.com</title>
  </head>
  <body>
    <!-- 壊れた配線（意図的）: tracklint が検出すべき点をわざと含む。
         1. 送信コントロールが input で button ではない          -> submit-not-button (error)
         2. action 先のサンクスページに noindex が無い            -> thankyou-indexable (error)
         3. AJAX 送信なのに成功時の計測イベントを送っていない      -> ajax-no-conversion (warn) -->
    <form id="contact-form" action="thanks.html" method="post">
      <input type="text" name="name" required />
      <input type="email" name="email" required />
      <input type="submit" value="送信する" />
    </form>

    <script>
      document.getElementById('contact-form').addEventListener('submit', async (e) => {
        e.preventDefault();
        await fetch('/api/contact', { method: 'POST', body: new FormData(e.target) });
        alert('送信しました'); // 計測イベントを送っていない
      });
    </script>
  </body>
</html>
