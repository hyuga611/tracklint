name: ci
on:
  push:
  pull_request:

# least privilege: this workflow only needs to read the repo
permissions:
  contents: read

jobs:
  # dogfood: run the published action on the canonical "correct wiring" fixture — must pass (exit 0)
  dogfood:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: ./
        with:
          files: examples/good

  # regression gate: the "broken wiring" fixture must fail (exit 1) with the expected rule ids
  detects-bad:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - name: examples/bad must fail with expected rules
        run: |
          out="$(node src/check.mjs examples/bad 2>&1)" && { echo "expected non-zero exit"; echo "$out"; exit 1; } || true
          echo "$out"
          echo "$out" | grep -q 'submit-not-button'  || { echo "missing submit-not-button"; exit 1; }
          echo "$out" | grep -q 'thankyou-indexable'  || { echo "missing thankyou-indexable"; exit 1; }

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v7
        with:
          node-version: 20
      - run: node --test
